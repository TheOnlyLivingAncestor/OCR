apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-webservice
spec:
  selector:
    matchLabels:
      app: ocr-webservice
  template:
    metadata:
      labels:
        app: ocr-webservice
    spec:
      containers:
        - name: ocr-webservice
          image: vitezalexandra/ocr-webservice:{{ .Values.env.APP_VERSION }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
                path: /healthz
                port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
                path: /healthz
                port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3