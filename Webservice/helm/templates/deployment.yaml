apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-webservice
spec:
  selector:
    matchLabels:
      app: ocr-webservice
  template:
    metadata:
      labels:
        app: ocr-webservice
    spec:
      containers:
        - name: ocr-webservice
          image: vitezalexandra/ocr-webservice:{{ .Values.env.APP_VERSION }}
          env:
            - name: MINIO_ADDR
              valueFrom:
                configMapKeyRef:
                  name: minio-configmap
                  key: minio_service_name
            - name: MINIO_PORT
              valueFrom:
                configMapKeyRef:
                  name: minio-configmap
                  key: minio_service_port
            - name: MINIO_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: minio-configmap
                  key: minio_bucket_name
            - name: MINIO_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: username
            - name: MINIO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: password
            - name: RABBITMQ_ADDR
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-configmap
                  key: rabbitmq_service_name
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-configmap
                  key: rabbitmq_service_port
            - name: RABBITMQ_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-configmap
                  key: rabbitmq_queue_name
            - name: RABBITQM_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
                path: /healthz
                port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
                path: /healthz
                port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3